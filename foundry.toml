[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
remappings = ["@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"]
solc = "0.8.20"
evm_version = "london"
optimizer = true
optimizer_runs = 200

[profile.noopt]
optimizer = false

[profile.viair]
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
base = "https://mainnet.base.org"
base_sepolia = "https://sepolia.base.org"
